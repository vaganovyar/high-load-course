server:
    address: 0.0.0.0
    http2.enabled: true
    port: 8081

spring:
  # Postgres event store properties
  datasource:
    hikari:
      username: tiny_es
      jdbc-url: jdbc:postgresql://${POSTGRES_ADDRESS:localhost}:${POSTGRES_PORT:65432}/postgres
      leak-detection-threshold: 2000
      password: tiny_es
  main:
    allow-bean-definition-overriding: true
  # MongoDB properties
  data:
    mongodb:
      port: 27017
      host: localhost
      database: online-shop

management:
  endpoints:
    web:
      exposure:
        include: info,health,prometheus,metrics
  metrics:
    export:
      prometheus.enabled: true
    web:
      server:
        request.autotime.percentiles: 0.95

# Tiny event sourcing library properties
event:
  sourcing:
    sagas-enabled: false
    snapshots-enabled: false
    scan-package: ru.quipy
    auto-scan-enabled: true

payment:
  hostPort: ${PAYMENT_HOST:localhost}:${PAYMENT_PORT:1234}
  accounts: ${PAYMENT_ACCOUNTS:acc-19}
  token: ${PAYMENT_TOKEN}
  service-name: ${PAYMENT_SERVICE_NAME}

metrics:
  incoming-requests:
    name: incoming_requests
    description: "incoming requests"
    tags:
      - method
      - uri
  outgoing-responses:
    name: outgoing_responses
    description: "outgoing responses"
    tags:
      - method
      - uri
  completed-tasks:
    name: completed_tasks
    description: "completed tasks"
    tags:
      - method
  queue-size:
    name: payment_queue_size
    description: "payment queue size"
  external-system-response-time:
    name: external_system_response_time
    description: "external system response time in milliseconds"
    quantiles: 0.5, 0.75, 0.9, 0.95, 0.99
  external-system-single-payment-retries:
    name: external_system_single_payment_retries
    description: "external system calls for one payment before succesfull response"
    tags:
      - account
      - retries_count

thread-pools:
  payment-external-service-thread-pool-config:
    threads-number: 128
    background-task-threads-number: 32
    request-handler-threads-number: 32
  parallel-idempotency-requests-executor-service-thread-pool-config:
    threads-number: 128

retries:
  payment:
    max-retries: 5

back-pressure:
  use-precise-queue-process-time: false

logging:
  enabled: true
  sample: 100

queue-simulation:
  enabled: false

hedged-requests:
  tries: 5
  delay: 200
